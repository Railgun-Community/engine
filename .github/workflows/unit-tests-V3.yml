name: Unit Tests (V3)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'yarn'
      - run: corepack enable
      - run: yarn install --frozen-lockfile
      - name: Yarn test
        shell: bash
        run: yarn test
